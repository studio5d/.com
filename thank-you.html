<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">

<!-- Favicon -->
<link rel="icon" type="image/png" href="img/logo.png">

<!-- Link Preview / Social Media -->
<meta property="og:type" content="website">
<meta property="og:title" content="Studio 5D - Thank You">
<meta property="og:description" content="Thank you for your attendance submission">
<meta property="og:image" content="img/logo.png">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Studio 5D - Thank You">
<meta name="twitter:description" content="Thank you for your attendance submission">
<meta name="twitter:image" content="img/logo.png">

<title>Studio 5D - Thank You</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --neon:#00f7ff;
  --violet:#6366f1;
  --violet-dark:#4f46e5;
  --success:#10b981;
  --warning:#f59e0b;
  --text-primary:#f1f5f9;
  --text-secondary:#94a3b8;
  --text-muted:#64748b;
}

* { box-sizing:border-box; margin:0; padding:0; }

body {
  font-family: 'Inter', sans-serif;
  background: 
    radial-gradient(ellipse at 20% 0%, rgba(99,102,241,0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(0,247,255,0.1) 0%, transparent 50%),
    linear-gradient(180deg, #0a0e17 0%, #0d1321 50%, #0a0e17 100%);
  min-height:100vh;
  color:var(--text-primary);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.container {
  width:100%;
  max-width:420px;
  text-align:center;
}

.success-icon {
  width:120px;
  height:120px;
  margin:0 auto 24px;
  background:linear-gradient(135deg, var(--success), #059669);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  animation: pulse 0.6s ease;
}

@keyframes pulse {
  0% { transform:scale(0); }
  50% { transform:scale(1.1); }
  100% { transform:scale(1); }
}

.success-icon svg {
  width:60px;
  height:60px;
  fill:#fff;
}

h1 {
  font-family:'Poppins', sans-serif;
  font-size:28px;
  font-weight:700;
  margin-bottom:12px;
}

h1.check-in {
  color:var(--neon);
}

h1.check-out {
  color:var(--warning);
}

.message {
  font-size:16px;
  color:var(--text-secondary);
  margin-bottom:32px;
  line-height:1.6;
}

.expiry-box {
  background:rgba(245,158,11,0.15);
  border:1px solid rgba(245,158,11,0.3);
  border-radius:16px;
  padding:20px;
  margin-bottom:24px;
}

.expiry-box p {
  font-size:14px;
  color:var(--warning);
  margin:0;
}

.expiry-box .link-expired {
  font-size:12px;
  color:var(--text-muted);
  margin-top:8px;
}

.back-btn {
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:14px 28px;
  background:linear-gradient(135deg, var(--violet), var(--violet-dark));
  border-radius:12px;
  color:#fff;
  text-decoration:none;
  font-weight:600;
  font-size:15px;
  transition:all 0.2s ease;
}

.back-btn:hover {
  transform:translateY(-2px);
  box-shadow: 0 8px 25px rgba(99,102,241,0.4);
}

.back-btn svg {
  width:18px;
  height:18px;
  fill:#fff;
}

.footer {
  margin-top:32px;
  font-size:12px;
  color:var(--text-muted);
}
</style>
</head>

<body>

<div class="container">
  <div class="success-icon">
    <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
  </div>
  
  <h1 id="title">Thank You!</h1>
  <p class="message" id="message">Your attendance has been recorded</p>
  
  <div class="expiry-box">
    <p id="expiryText">🔄 Scan QR again for Check-Out when leaving</p>
    <p class="link-expired">Link expires after submission</p>
  </div>
  
  <a href="Check in.html" class="back-btn">
    <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    Back to Check-In
  </a>
  
  <div class="footer">
    Studio 5D Attendance System © 2026
  </div>
</div>

<script>
// Get action from URL parameter
const urlParams = new URLSearchParams(window.location.search);
const action = urlParams.get('action');

const titleEl = document.getElementById('title');
const messageEl = document.getElementById('message');
const expiryEl = document.getElementById('expiryText');

if (action === 'resumption') {
  titleEl.textContent = '✅ Welcome to Studio 5D';
  titleEl.className = 'check-in';
  messageEl.textContent = 'Have a productive day at work.';
  expiryEl.textContent = '🔄 Scan QR again for Check-Out when leaving';
} else if (action === 'closing') {
  titleEl.textContent = '👋 Good Bye';
  titleEl.className = 'check-out';
  messageEl.textContent = 'Stay safe and be sure to come on time to avoid salary deduction';
  expiryEl.textContent = '🌅 Scan QR again tomorrow for Check-In';
} else {
  titleEl.textContent = '✅ Thank You!';
  messageEl.textContent = 'Your attendance has been recorded';
}
</script>

</body>
</html>
